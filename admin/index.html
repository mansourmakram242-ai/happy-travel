<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - Happy Travel</title>
  <link rel="stylesheet" href="../public/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo"><i class="fas fa-paper-plane"></i> Happy Travel</div>
    <p>Admin Dashboard</p>
    <div class="login-error" id="loginError">Incorrect username or password</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="form-submit" onclick="doLogin()">Login <i class="fas fa-arrow-right"></i></button>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);font-size:0.8rem">Default: admin / happytravel2024</p>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('ht_admin_auth') === 'true') {
    window.location.href = 'dashboard.html';
  }

  function doLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    // Get credentials (can be changed in dashboard)
    const savedUser = localStorage.getItem('ht_admin_user') || 'admin';
    const savedPass = localStorage.getItem('ht_admin_pass') || 'happytravel2024';
    if (user === savedUser && pass === savedPass) {
      localStorage.setItem('ht_admin_auth', 'true');
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
