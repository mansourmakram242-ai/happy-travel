<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Travel</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#007bff;color:#fff;padding:20px;text-align:center}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);overflow:hidden}
.card img{width:100%;height:180px;object-fit:cover}
.card h3{margin:10px}
.card p{margin:10px;color:#555}
.btn{display:block;margin:10px;background:#25D366;color:#fff;text-align:center;padding:10px;border-radius:5px;text-decoration:none}
</style>
</head>
<body>
<header>
<h1>Happy Travel - Hurghada</h1>
<p>Best Trips & Transfers in Hurghada</p>
</header>

<div class="container" id="trips"></div>

<script>
const trips = [
{name:"Orange Bay Island",price:"30€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Paradise Island",price:"35€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Dolphin House",price:"40€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Snorkeling Trip",price:"25€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Safari Quad",price:"20€",img:"https://images.unsplash.com/photo-1518684079-3c830dcef090"},
{name:"Super Safari",price:"35€",img:"https://images.unsplash.com/photo-1518684079-3c830dcef090"},
{name:"Buggy Safari",price:"30€",img:"https://images.unsplash.com/photo-1518684079-3c830dcef090"},
{name:"Glass Boat",price:"15€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Submarine",price:"50€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Fishing Trip",price:"45€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Luxor Trip",price:"60€",img:"https://images.unsplash.com/photo-1587974928442-77dc3e0dba72"},
{name:"Cairo Trip",price:"80€",img:"https://images.unsplash.com/photo-1572252009286-268acec5ca0a"},
{name:"Aswan Trip",price:"90€",img:"https://images.unsplash.com/photo-1587974928442-77dc3e0dba72"},
{name:"Private Boat",price:"120€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"VIP Island",price:"70€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Horse Riding",price:"25€",img:"https://images.unsplash.com/photo-1501706362039-c6e80948c4b7"},
{name:"Camel Ride",price:"15€",img:"https://images.unsplash.com/photo-1558980664-10ea8c5c3a2b"},
{name:"City Tour Hurghada",price:"10€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
{name:"Spa & Massage",price:"30€",img:"https://images.unsplash.com/photo-1556228724-4a1d9b4f6f7c"},
{name:"Dinner Cruise",price:"40€",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"}
];

const container = document.getElementById("trips");

trips.forEach(trip=>{
container.innerHTML += `
<div class="card">
<img src="${trip.img}">
<h3>${trip.name}</h3>
<p>${trip.price}</p>
<a class="btn" href="https://wa.me/201010233852">Book Now</a>
</div>`;
});
</script>

</body>
</html>
