<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Travel</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#007bff;color:#fff;padding:20px;text-align:center}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);overflow:hidden}
.card img{width:100%;height:180px;object-fit:cover}
.card h3{margin:10px}
.card p{margin:10px;color:#555}
.btn{display:block;margin:10px;background:#25D366;color:#fff;text-align:center;padding:10px;border-radius:5px;text-decoration:none}
</style>
</head>
<body>

<header>
<h1>Happy Travel - Hurghada</h1>
<p>Trips & Transfers</p>
</header>

<div class="container" id="trips"></div>

<script>
fetch('trips.json')
.then(res=>res.json())
.then(data=>{
const container = document.getElementById("trips");
data.forEach(trip=>{
container.innerHTML += `
<div class="card">
<img src="${trip.img}">
<h3>${trip.name}</h3>
<p>${trip.price}</p>
<a class="btn" href="https://wa.me/201010233852">Book Now</a>
</div>`;
});
});
</script>

</body>
</html>
